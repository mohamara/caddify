# managed by ./proxy / dashboard
# format: domain  port  [host]  [ssl|nossl]
#
# ssl (default): automatic Let's Encrypt certificate
# nossl: HTTP only — no certificate
#
# examples:
# app.example.com   3000
# api.example.com   8080  ssl
# local.test        9000  nossl
# other.com         9000  10.0.0.5  nossl
